<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Manager — Astro Sveltia Cloudflare</title>
  <style>
    :root { --brand: oklch(0.45 0.1 260); --brand-accent: oklch(0.55 0.15 260); --nc-bg: #fafafa; --nc-surface: #ffffff; --nc-border: #e5e7eb; --nc-text: #111827; --nc-text-muted: #6b7280; --nc-primary: var(--brand); --nc-primary-hover: var(--brand-accent); }
    @media (prefers-color-scheme: dark) { :root { --nc-bg: #0f172a; --nc-surface: #1e293b; --nc-border: #334155; --nc-text: #f8fafc; --nc-text-muted: #94a3b8; } }
    html, body { height: 100%; margin: 0; padding: 0; }
    #nc-root { height: 100%; width: 100%; }
    .cms-loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui, sans-serif; color: #666; }
  </style>
</head>
<body>
  <div id="nc-root"><div class="cms-loading">Loading Sveltia CMS...</div></div>
  <script type="module">
    // Sveltia CMS — pinned for reproducible, supply-chain-safe loads.
    // Bump this single version constant to upgrade. Latest: https://github.com/sveltia/sveltia-cms/releases
    const SVELTIA_CMS_VERSION = '0.168.0';

    // ── Email/password-only SSO bridge ─────────────────────────────────────
    // Editors authenticate with email/password (+2FA) via Better Auth; reaching
    // this page already requires a valid session (admin middleware). We then
    // fetch the server-held GitHub token and pre-seed Sveltia's session so the
    // GitHub sign-in screen never appears. Sveltia restores the session on init
    // by reading `sveltia-cms.user` and validating the token via the GitHub API.
    // If anything here fails, we fall back to Sveltia's normal login screen
    // (whose "Sign In with GitHub" also resolves to the token, never GitHub).
    try {
      const res = await fetch('/api/cms/token', {
        credentials: 'include',
        headers: { Accept: 'application/json' },
      });
      if (res.status === 401) {
        location.href = '/login?return_to=' + encodeURIComponent('/admin/');
        throw new Error('redirecting-to-login');
      }
      if (res.ok) {
        const { token } = await res.json();
        if (token) {
          localStorage.setItem(
            'sveltia-cms.user',
            JSON.stringify({ backendName: 'github', token }),
          );
        }
      }
    } catch (e) {
      if (e && e.message === 'redirecting-to-login') {
        // Stop initializing the CMS while the browser navigates to /login.
        throw e;
      }
      console.warn('CMS SSO pre-seed failed; falling back to sign-in screen.', e);
    }

    try {
      const CMS = await import(`https://cdn.jsdelivr.net/npm/@sveltia/cms@${SVELTIA_CMS_VERSION}/dist/sveltia-cms.mjs`);
      CMS.init({ config: { load_config: true } });
    } catch (e) {
      if (e && e.message === 'redirecting-to-login') throw e;
      document.getElementById('nc-root').innerHTML = 
        '<div style="padding:2rem;font-family:system-ui,sans-serif;max-width:600px;margin:2rem auto;text-align:center">' +
        '<h2>CMS Load Failed</h2>' +
        '<pre style="text-align:left;background:#f5f5f5;padding:1rem;overflow:auto;">' + e.stack + '</pre>' +
        '<p>Check browser console for details.</p>' +
        '</div>';
      console.error('CMS init error:', e);
    }
  </script>
</body>
</html>
