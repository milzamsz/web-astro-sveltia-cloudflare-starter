<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Manager — Astro Sveltia Cloudflare</title>
  <style>
    :root { --brand: oklch(0.45 0.1 260); --brand-accent: oklch(0.55 0.15 260); --nc-bg: #fafafa; --nc-surface: #ffffff; --nc-border: #e5e7eb; --nc-text: #111827; --nc-text-muted: #6b7280; --nc-primary: var(--brand); --nc-primary-hover: var(--brand-accent); }
    @media (prefers-color-scheme: dark) { :root { --nc-bg: #0f172a; --nc-surface: #1e293b; --nc-border: #334155; --nc-text: #f8fafc; --nc-text-muted: #94a3b8; } }
    html, body { height: 100%; margin: 0; padding: 0; }
    #nc-root { height: 100%; width: 100%; }
    .cms-loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui, sans-serif; color: #666; }
  </style>
</head>
<body>
  <div id="nc-root"><div class="cms-loading">Loading Sveltia CMS...</div></div>
  <script type="module">
    // Sveltia CMS — pinned for reproducible, supply-chain-safe loads.
    // Bump this single version constant to upgrade. Latest: https://github.com/sveltia/sveltia-cms/releases
    const SVELTIA_CMS_VERSION = '0.168.0';
    try {
      const CMS = await import(`https://cdn.jsdelivr.net/npm/@sveltia/cms@${SVELTIA_CMS_VERSION}/dist/sveltia-cms.mjs`);
      CMS.init({ config: { load_config: true } });
    } catch (e) {
      document.getElementById('nc-root').innerHTML = 
        '<div style="padding:2rem;font-family:system-ui,sans-serif;max-width:600px;margin:2rem auto;text-align:center">' +
        '<h2>CMS Load Failed</h2>' +
        '<pre style="text-align:left;background:#f5f5f5;padding:1rem;overflow:auto;">' + e.stack + '</pre>' +
        '<p>Check browser console for details.</p>' +
        '</div>';
      console.error('CMS init error:', e);
    }
  </script>
</body>
</html>
