# ===============================================================
# Agentic Kanban board configuration (managed file)
# Edit the values below; this header is regenerated on every save.
#
# profile: standard | lite        (lanes derive from profile)
# enforcement.mode: strict | warn  (strict blocks illegal moves; warn allows and warns)
#   overrides.allowed: true | false
#   overrides.actors: [human] | [human, agent] | [agent]
#   overrides.requireReason: true | false
# reviewPolicy.<low|medium|high|critical>.<planning|implementation>:
#   self-agent | independent-agent | independent-agent+human
# worktreePolicy.requiredForImplementation: true | false
# wipLimits.<lane>: <max tasks in that lane>  (e.g. in-progress: 1; omit/0 = no limit)
# policies.transition.requireChecklistForInProgress: true | false
# policies.transition.requireSpecForInProgress: true | false
# policies.transition.requireDescriptionForReview: true | false
# policies.transition.requireWorktreeForInProgress: true | false
# policies.transition.requireDoneChecklistForDone: true | false  (review -> done also needs a full Definition of Done section)
# policies.verification.testCommand: "npm test" (run on in-progress -> review)
# policies.verification.lintCommand: "npm run lint" (run on in-progress -> review)
# policies.verification.buildCommand: "npm run build" (run on in-progress -> review)
#
# activeStack: odoo               (active stack pack name)
# skills: [git, workspace]        (always-on project skills)
# packs:                          (custom stack packs override packs.yaml)
#   - name: odoo
#     stack: Odoo 18.0
#     skills: [odoo-18]
#     coverage: [__manifest__.py]
#     verifyCmds: [npm test]
# ===============================================================
profile: standard
profileVersion: 3
lanes:
  - backlog
  - planning
  - in-progress
  - review
  - done
users: []
enforcement:
  mode: warn
  overrides:
    allowed: true
    actors:
      - agent
    requireReason: true
reviewPolicy:
  low:
    planning: self-agent
    implementation: self-agent
  medium:
    planning: self-agent
    implementation: self-agent
  high:
    planning: independent-agent
    implementation: independent-agent
  critical:
    planning: independent-agent
    implementation: independent-agent+human
worktreePolicy:
  requiredForImplementation: false
policies:
  transition:
    requireChecklistForInProgress: true
    requireSpecForInProgress: true
    requireDescriptionForReview: true
    requireWorktreeForInProgress: false
    requireDoneChecklistForDone: true
  verification:
    testCommand: ""
    lintCommand: ""
    buildCommand: ""
wipLimits:
  in-progress: 3
packs:
  - name: odoo
    stack: Odoo
    skills:
      - odoo-19
      - odoo-performance-tuner
      - odoo-upgrade
      - odoo-owl
      - odoo-rpc-api
    coverage:
      - __manifest__.py (deps, data, assets)
      - models + fields + compute/constraints + _sql_constraints/models.Constraint
      - security (groups, ir.model.access.csv, record rules, multi-company)
      - views (list/form/search/kanban, actions, menus)
      - QWeb reports
      - cron/server actions
      - sequences
      - demo/seed (noupdate)
      - i18n (PO)
      - migration scripts (pre/post/end)
    verifyCmds:
      - odoo-bin -d test-db -i <module-name> --stop-after-init
  - name: web
    stack: Web Frontend
    skills:
      - shadcn
      - design-guide
      - design-taste-frontend
      - high-end-visual-design
    coverage:
      - component structure, design tokens
      - accessibility (a11y)
      - responsive layout
      - state management
      - data fetching
      - error/empty/loading states
  - name: api
    stack: API / backend (Python)
    skills:
      - fastapi-expert
      - fastapi-templates
      - supabase
      - supabase-postgres-best-practices
    coverage:
      - Pydantic v2 models
      - async routes
      - dependency injection
      - auth (JWT)
      - DB layer (async SQLAlchemy)
      - error handling
      - OpenAPI docs
      - rate limiting
  - name: go
    stack: Go services
    skills:
      - golang-pro
    coverage:
      - concurrency (goroutines/channels)
      - interfaces/generics
      - gRPC/REST
      - error handling
      - context propagation
  - name: frappe
    stack: Frappe / ERPNext
    skills:
      - frappe-router
    coverage:
      - DocTypes, controllers, hooks
      - permissions
      - web forms/portal
      - print formats
activeStack: web
skills:
  - astro
  - design-guide
  - design-taste-frontend
  - design-taste-frontend-v1
  - frontend-design
labels:
  - goal
  - epic
  - priority:critical
  - blocked-by:bootstrap-governance-and-skills-lock
  - blocked-by:astro-foundation-and-design-system
  - priority:high
  - blocked-by:i18n-routing-and-locale-governance
  - blocked-by:core-marketing-pages
  - blocked-by:blog-docs-and-search-experience
  - blocked-by:cms-content-modeling-and-editor-experience
  - blocked-by:media-pipeline-and-r2-delivery
  - blocked-by:auth-admin-access-and-2fa
  - blocked-by:preview-publish-and-editorial-ops
  - blocked-by:contact-intake-maps-and-analytics
  - blocked-by:seo-ai-discovery-and-cleanup-ops
  - blocked
