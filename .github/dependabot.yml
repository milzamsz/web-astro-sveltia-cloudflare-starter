# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
      astro:
        patterns:
          - "astro*"
          - "@astrojs/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier*"
          - "stylelint*"
      testing:
        patterns:
          - "vitest*"
          - "@vitest/*"
      security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"