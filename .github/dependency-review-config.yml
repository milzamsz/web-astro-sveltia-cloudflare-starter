# Dependency Review Configuration
# https://github.com/actions/dependency-review-action#configuration-options

# Severity thresholds for failing the build
# Options: low, moderate, high, critical
fail-on-severity: moderate

# Allow licenses (SPDX identifiers)
# Using OSI-approved permissive licenses + CC0
allow-licenses:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - CC0-1.0
  - Unicode-DFS-2015
  - Unicode-DFS-2016

# Deny specific licenses
deny-licenses:
  - AGPL-3.0
  - GPL-3.0
  - LGPL-3.0
  - SSPL-1.0

# Allow scopes for exceptions (use sparingly)
# allow-scopes:
#   - "development"